<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400">
  <defs>
    <g id="detail-flower" fill="currentColor">
      <ellipse cx="0" cy="-18" rx="7" ry="20" opacity=".06"/>
      <ellipse cx="0" cy="-18" rx="7" ry="20" opacity=".06" transform="rotate(72)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="20" opacity=".06" transform="rotate(144)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="20" opacity=".06" transform="rotate(216)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="20" opacity=".06" transform="rotate(288)"/>
      <ellipse cx="0" cy="-12" rx="5" ry="13" opacity=".1"/>
      <ellipse cx="0" cy="-12" rx="5" ry="13" opacity=".1" transform="rotate(36)"/>
      <ellipse cx="0" cy="-12" rx="5" ry="13" opacity=".1" transform="rotate(108)"/>
      <ellipse cx="0" cy="-12" rx="5" ry="13" opacity=".1" transform="rotate(180)"/>
      <ellipse cx="0" cy="-12" rx="5" ry="13" opacity=".1" transform="rotate(252)"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="8" opacity=".15"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="8" opacity=".15" transform="rotate(72)"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="8" opacity=".15" transform="rotate(144)"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="8" opacity=".15" transform="rotate(216)"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="8" opacity=".15" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="5" opacity=".2"/>
      <circle cx="0" cy="0" r="2.5" opacity=".35"/>
    </g>

    <g id="medium-flower" fill="currentColor">
      <ellipse cx="0" cy="-12" rx="4.5" ry="13" opacity=".07"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="13" opacity=".07" transform="rotate(60)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="13" opacity=".07" transform="rotate(120)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="13" opacity=".07" transform="rotate(180)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="13" opacity=".07" transform="rotate(240)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="13" opacity=".07" transform="rotate(300)"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".15"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".15" transform="rotate(60)"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".15" transform="rotate(120)"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".15" transform="rotate(180)"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".15" transform="rotate(240)"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".15" transform="rotate(300)"/>
      <circle cx="0" cy="0" r="3.5" opacity=".22"/>
      <circle cx="0" cy="0" r="1.5" opacity=".4"/>
    </g>

    <g id="small-flower" fill="currentColor">
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".08"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".08" transform="rotate(72)"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".08" transform="rotate(144)"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".08" transform="rotate(216)"/>
      <ellipse cx="0" cy="-6" rx="2.5" ry="7" opacity=".08" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="2" opacity=".18"/>
      <circle cx="0" cy="0" r="1" opacity=".3"/>
    </g>

    <g id="sparkle" fill="currentColor">
      <path d="M0 -12 C 1.5 -4, 4 -1.5, 12 0 C 4 1.5, 1.5 4, 0 12 C -1.5 4, -4 1.5, -12 0 C -4 -1.5, -1.5 -4, 0 -12" opacity=".12"/>
      <circle cx="0" cy="0" r="2.5" opacity=".22"/>
    </g>

    <g id="sparkle-small" fill="currentColor">
      <path d="M0 -6 C 1 -2, 2 -1, 6 0 C 2 1, 1 2, 0 6 C -1 2, -2 1, -6 0 C -2 -1, -1 -2, 0 -6" opacity=".15"/>
      <circle cx="0" cy="0" r="1.5" opacity=".25"/>
    </g>

    <g id="leaf" fill="currentColor">
      <path d="M0 0 C 6 -8, 12 -6, 16 0 C 12 6, 6 8, 0 0" opacity=".06"/>
    </g>
  </defs>

  <!-- Flowing vines at bottom -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" opacity=".05">
    <path d="M-20 360 C 120 330, 220 380, 340 350 C 460 320, 560 370, 680 340 C 800 310, 900 370, 1020 340 C 1140 310, 1240 370, 1420 340"/>
    <path d="M-20 380 C 150 360, 280 400, 420 370 C 560 340, 680 390, 820 360 C 960 330, 1100 380, 1420 360" stroke-width="1" opacity=".03"/>
  </g>

  <!-- Stems/curling tendrils -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity=".04">
    <path d="M160 340 C 140 300, 180 280, 200 250 C 210 230, 195 215, 180 220"/>
    <path d="M1200 350 C 1220 310, 1180 290, 1160 260 C 1150 240, 1165 225, 1180 230"/>
    <path d="M700 360 C 690 330, 710 310, 700 290 C 695 280, 705 270, 710 275"/>
    <path d="M460 370 C 440 340, 460 320, 450 300"/>
    <path d="M920 365 C 940 335, 920 315, 930 295"/>
  </g>

  <!-- Leaves -->
  <g opacity=".6">
    <use href="#leaf" transform="translate(120, 355) rotate(-30) scale(1.2)"/>
    <use href="#leaf" transform="translate(300, 370) rotate(20) scale(1)"/>
    <use href="#leaf" transform="translate(480, 350) rotate(-15) scale(.9)"/>
    <use href="#leaf" transform="translate(640, 360) rotate(25) scale(1.1)"/>
    <use href="#leaf" transform="translate(820, 355) rotate(-20) scale(1)"/>
    <use href="#leaf" transform="translate(990, 370) rotate(15) scale(1.2)"/>
    <use href="#leaf" transform="translate(1150, 345) rotate(-35) scale(.9)"/>
    <use href="#leaf" transform="translate(1310, 365) rotate(10) scale(1.1)"/>
  </g>

  <!-- Detailed large flowers -->
  <use href="#detail-flower" transform="translate(200, 300) scale(2.8)"/>
  <use href="#detail-flower" transform="translate(1180, 295) scale(2.5)"/>

  <!-- Medium flowers -->
  <use href="#medium-flower" transform="translate(520, 320) scale(2)"/>
  <use href="#medium-flower" transform="translate(860, 315) scale(1.8)"/>
  <use href="#medium-flower" transform="translate(690, 330) scale(1.4)"/>

  <!-- Small scattered flowers -->
  <use href="#small-flower" transform="translate(80, 340) scale(1.2)"/>
  <use href="#small-flower" transform="translate(340, 335) scale(1)"/>
  <use href="#small-flower" transform="translate(420, 345) scale(.8)"/>
  <use href="#small-flower" transform="translate(600, 340) scale(.9)"/>
  <use href="#small-flower" transform="translate(760, 340) scale(.7)"/>
  <use href="#small-flower" transform="translate(980, 335) scale(1.1)"/>
  <use href="#small-flower" transform="translate(1060, 350) scale(.8)"/>
  <use href="#small-flower" transform="translate(1260, 340) scale(.9)"/>
  <use href="#small-flower" transform="translate(1340, 345) scale(.7)"/>
  <use href="#small-flower" transform="translate(270, 345) scale(.6)"/>
  <use href="#small-flower" transform="translate(780, 350) scale(.5)"/>
  <use href="#small-flower" transform="translate(1100, 345) scale(.6)"/>

  <!-- Sparkles -->
  <use href="#sparkle" transform="translate(140, 230) scale(1)"/>
  <use href="#sparkle" transform="translate(1240, 220) scale(.9)"/>
  <use href="#sparkle" transform="translate(400, 250) scale(.7)"/>
  <use href="#sparkle" transform="translate(1000, 245) scale(.8)"/>
  <use href="#sparkle" transform="translate(660, 240) scale(.6)"/>
  <use href="#sparkle" transform="translate(760, 220) scale(.55)"/>
  <use href="#sparkle" transform="translate(320, 210) scale(.5)"/>
  <use href="#sparkle" transform="translate(1080, 215) scale(.65)"/>
  <use href="#sparkle" transform="translate(540, 235) scale(.45)"/>
  <use href="#sparkle" transform="translate(900, 225) scale(.5)"/>

  <!-- Small sparkle dots -->
  <use href="#sparkle-small" transform="translate(60, 280) scale(.8)"/>
  <use href="#sparkle-small" transform="translate(240, 260) scale(.7)"/>
  <use href="#sparkle-small" transform="translate(480, 280) scale(.6)"/>
  <use href="#sparkle-small" transform="translate(620, 265) scale(.9)"/>
  <use href="#sparkle-small" transform="translate(840, 270) scale(.7)"/>
  <use href="#sparkle-small" transform="translate(960, 260) scale(.8)"/>
  <use href="#sparkle-small" transform="translate(1140, 270) scale(.6)"/>
  <use href="#sparkle-small" transform="translate(1280, 260) scale(.7)"/>
  <use href="#sparkle-small" transform="translate(1360, 280) scale(.5)"/>
  <use href="#sparkle-small" transform="translate(180, 275) scale(.5)"/>
  <use href="#sparkle-small" transform="translate(720, 270) scale(.4)"/>
  <use href="#sparkle-small" transform="translate(1020, 275) scale(.5)"/>
</svg>
