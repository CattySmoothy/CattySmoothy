{% extends "base.html" %}

{% block content %}
<div class="about-layout" style="justify-content: center;">
    <div class="about-box" style="max-width: 480px;">
        <section class="support-header">
            <div class="content-container">
                <h1 class="page-title">Send Stardust</h1>
                <p class="page-subtitle">Your support means the world</p>
            </div>
        </section>

        <form class="donate-form" id="donateForm">
            <div class="donate-field">
                <label class="donate-label" for="donateAmount">Amount</label>
                <div class="donate-amount-wrap">
                    <span class="donate-currency-symbol">$</span>
                    <input type="number" id="donateAmount" class="donate-input" value="{{ amount }}" min="0.50" step="0.50" readonly>
                </div>
            </div>

            <div class="donate-field">
                <label class="donate-label" for="donateName">Your Name</label>
                <input type="text" id="donateName" class="donate-input" placeholder="Starlight" maxlength="30" required>
            </div>

            <div class="donate-field">
                <label class="donate-label" for="donateMessage">Message</label>
                <textarea id="donateMessage" class="donate-textarea" placeholder="Love your art!" maxlength="100" rows="3"></textarea>
            </div>

            <div class="donate-field">
                <label class="donate-label">Visibility</label>
                <div class="donate-visibility">
                    <label class="donate-radio">
                        <input type="radio" name="visibility" value="public" checked>
                        <span class="donate-radio-label">Public <span class="donate-note">(shown on supporters page)</span></span>
                    </label>
                    <label class="donate-radio">
                        <input type="radio" name="visibility" value="private">
                        <span class="donate-radio-label">Private <span class="donate-note">(only the artist can see)</span></span>
                    </label>
                </div>
            </div>

            <button type="submit" class="plan-button donate-submit">Complete Donation</button>
        </form>
    </div>
</div>

<script>
document.getElementById('donateForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var name = document.getElementById('donateName').value || 'Anonymous';
    var msg = document.getElementById('donateMessage').value || '';
    var amt = document.getElementById('donateAmount').value;
    var vis = document.querySelector('input[name="visibility"]:checked').value;
    var note = vis === 'public'
        ? 'Your message will appear publicly among the stars.'
        : 'Your message will be kept private, only visible to the artist.';
    alert('Thank you, ' + name + '! \\nYour donation of $' + amt + ' will light up the sky. \\n' + note);
    window.location.href = "{{ url_for('donors_page') }}";
});
</script>
{% endblock %}
