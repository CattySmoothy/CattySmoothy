<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Raichuu - Creating digital art, process videos, tutorials, wallpapers and more">
    <meta name="author" content="Raichuu">
    
    <!-- Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <title>{{ title }} - CattySmoothy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/redesign.css') }}">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <div class="theme-picker">
                    <button class="theme-btn active" data-theme="default" title="Default" style="--theme-gradient: linear-gradient(135deg, #D4C9B8, #B8C4D0)"></button>
                    <button class="theme-btn" data-theme="ocean" title="Ocean" style="--theme-gradient: linear-gradient(135deg, #A8D4E8, #7BB8D8)"></button>
                    <button class="theme-btn" data-theme="forest" title="Forest" style="--theme-gradient: linear-gradient(135deg, #B8D8B8, #8EC8A0)"></button>
                    <button class="theme-btn" data-theme="lavender" title="Lavender" style="--theme-gradient: linear-gradient(135deg, #D0C0E8, #B8A0D8)"></button>
                    <button class="theme-btn" data-theme="rose" title="Rose" style="--theme-gradient: linear-gradient(135deg, #E8C0C0, #D8A0A0)"></button>
                </div>
            </div>
        </div>
    </header>
    
    <nav class="main-nav">
        <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">WORK</a>
        <a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}">ABOUT</a>
        <a href="{{ url_for('profile') }}" class="{% if request.endpoint == 'profile' %}active{% endif %}">COMMUNITY</a>
    </nav>
    
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Raichuu. All rights reserved.</p>
        </div>
    </footer>

    <script>
        (function() {
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            if (saved && saved !== 'default') {
                html.setAttribute('data-theme', saved);
            }

            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const theme = this.dataset.theme;
                    if (theme === 'default') {
                        html.removeAttribute('data-theme');
                    } else {
                        html.setAttribute('data-theme', theme);
                    }
                    localStorage.setItem('theme', theme);
                });
            });

            if (saved) {
                const active = document.querySelector('.theme-btn[data-theme="' + saved + '"]');
                if (active) active.classList.add('active');
                else document.querySelector('.theme-btn[data-theme="default"]').classList.add('active');
            }
        })();
    </script>
</body>
</html>
