<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Raichuu - Creating digital art, process videos, tutorials, wallpapers and more">
    <meta name="author" content="Raichuu">
    
    <!-- Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <title>{{ title }} - CattySmoothy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/redesign.css') }}">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <div class="hsl-picker" id="hslPicker">
                    <div class="hsl-bars">
                        <div class="hsl-row">
                            <span class="moon-label">
                                <svg class="moon-icon" viewBox="0 0 24 24" width="16" height="16">
                                    <path d="M12 2a10 10 0 1 0 10 10 8 8 0 0 1-8-8 8 8 0 0 1 8-8z" fill="currentColor"/>
                                </svg>
                            </span>
                            <div class="hsl-track" id="hueTrack">
                                <div class="hsl-knob" id="knobHue" data-axis="hue">
                                    <svg class="shooting-star" viewBox="0 0 34 12" width="40" height="14">
                                        <path class="star-tail" d="M0 6 L18 6" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2.5 2.5" opacity="0.45"/>
                                        <path class="star-head" d="M 26 1 L 27.2 4.4 L 30.8 4.5 L 27.9 6.6 L 28.9 10 L 26 8 L 23.1 10 L 24.1 6.6 L 21.2 4.5 L 24.8 4.4 Z" fill="currentColor"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="hsl-row">
                            <span class="hsl-label">S</span>
                            <div class="hsl-track" id="satTrack">
                                <div class="hsl-knob" id="knobSat" data-axis="sat">
                                    <svg class="shooting-star" viewBox="0 0 34 12" width="40" height="14">
                                        <path class="star-tail" d="M0 6 L18 6" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2.5 2.5" opacity="0.45"/>
                                        <path class="star-head" d="M 26 1 L 27.2 4.4 L 30.8 4.5 L 27.9 6.6 L 28.9 10 L 26 8 L 23.1 10 L 24.1 6.6 L 21.2 4.5 L 24.8 4.4 Z" fill="currentColor"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="hsl-row">
                            <span class="moon-label" id="moonLabel">
                                <svg class="moon-icon moon-bright" viewBox="0 0 24 24" width="16" height="16">
                                    <circle cx="12" cy="12" r="10" fill="currentColor"/>
                                </svg>
                                <svg class="moon-icon moon-dark" viewBox="0 0 24 24" width="16" height="16" style="display:none">
                                    <path d="M12 2a10 10 0 1 0 10 10 8 8 0 0 1-8-8 8 8 0 0 1 8-8z" fill="currentColor"/>
                                </svg>
                            </span>
                            <div class="hsl-track" id="lightTrack">
                                <div class="hsl-knob" id="knobLight" data-axis="light">
                                    <svg class="shooting-star" viewBox="0 0 34 12" width="40" height="14">
                                        <path class="star-tail" d="M0 6 L18 6" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2.5 2.5" opacity="0.45"/>
                                        <path class="star-head" d="M 26 1 L 27.2 4.4 L 30.8 4.5 L 27.9 6.6 L 28.9 10 L 26 8 L 23.1 10 L 24.1 6.6 L 21.2 4.5 L 24.8 4.4 Z" fill="currentColor"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="hsl-swatch" id="hslSwatch" title="Apply theme">
                        <svg class="hsl-sparkle" viewBox="0 0 24 24" width="20" height="20">
                            <path d="M12 0l1.5 8.5L12 10l-1.5-1.5L12 0zm0 24l-1.5-8.5L12 14l1.5 1.5L12 24zM0 12l8.5-1.5L10 12l-1.5 1.5L0 12zm24 0l-8.5 1.5L14 12l1.5-1.5L24 12z" fill="currentColor"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <nav class="main-nav">
        <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">WORK</a>
        <a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}">ABOUT</a>
        <a href="{{ url_for('profile') }}" class="{% if request.endpoint == 'profile' %}active{% endif %}">COMMUNITY</a>
    </nav>
    
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Raichuu. All rights reserved.</p>
        </div>
    </footer>

    <script>
        (function() {
            const html = document.documentElement;

            const DEFAULT_H = 36, DEFAULT_S = 18, DEFAULT_L = 85;
            let hue = DEFAULT_H, sat = DEFAULT_S, light = DEFAULT_L;

            const saved = localStorage.getItem('hslTheme');
            if (saved) {
                try {
                    const p = JSON.parse(saved);
                    hue = p.h; sat = p.s; light = p.l;
                } catch(e) {}
            }

            // Track references
            const tracks = {
                hue: document.getElementById('hueTrack'),
                sat: document.getElementById('satTrack'),
                light: document.getElementById('lightTrack')
            };
            const knobs = {
                hue: document.getElementById('knobHue'),
                sat: document.getElementById('knobSat'),
                light: document.getElementById('knobLight')
            };
            const swatch = document.getElementById('hslSwatch');
            const sparkle = document.querySelector('.hsl-sparkle');

            function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

            function hslStr(h, s, l) {
                return `hsl(${((h % 360) + 360) % 360}, ${clamp(s, 0, 100)}%, ${clamp(l, 0, 100)}%)`;
            }
            function hslaStr(h, s, l, a) {
                return `hsla(${((h % 360) + 360) % 360}, ${clamp(s, 0, 100)}%, ${clamp(l, 0, 100)}%, ${a})`;
            }

            // Update sat/light track gradients + knob positions + swatch + star dots + glow
            function updateUI() {
                document.documentElement.style.setProperty('--hue-deg', hue);

                // Knob positions
                const huePct = hue / 360;
                const satPct = sat / 100;
                const lightPct = light / 100;

                knobs.hue.style.left = (huePct * 100) + '%';
                knobs.sat.style.left = (satPct * 100) + '%';
                knobs.light.style.left = (lightPct * 100) + '%';

                // Swatch
                swatch.style.background = hslStr(hue, sat, light);

                // Star pathway dots glow in current hue
                const dotColor = hslaStr(hue, Math.min(sat + 20, 70), Math.min(light + 15, 75), 0.4);
                html.style.setProperty('--star-dot', dotColor);

                // Track glow matches current color
                const glowColor = hslaStr(hue, sat, Math.min(light + 5, 70), 0.12);
                html.style.setProperty('--track-glow', glowColor);

                // Moon icon
                const brightMoon = document.querySelector('.moon-bright');
                const darkMoon = document.querySelector('.moon-dark');
                if (light <= 50) {
                    brightMoon.style.display = '';
                    darkMoon.style.display = 'none';
                } else {
                    brightMoon.style.display = 'none';
                    darkMoon.style.display = '';
                }
            }

            // Generate full theme from HSL
            function generateTheme(h, s, l) {
                const lf = clamp(l / 85, 0, 1);
                const bgL = clamp(l * 0.7 + 20, 18, 97);
                const surfL = clamp(bgL - 2, 20, 100);
                const text1L = clamp(12 + 85 * (1 - lf), 12, 97);
                const text2L = clamp(30 + 55 * (1 - lf), 30, 85);
                const text3L = clamp(45 + 30 * (1 - lf), 45, 75);
                const hdrH = ((h + 200) % 360 + 360) % 360;
                const hdrS = clamp(s - 5, 3, 40);
                const hdr1L = clamp(48 + 20 * lf, 25, 68);
                const hdr2L = clamp(60 + 18 * lf, 35, 78);
                const emailBgL = hdr1L;
                const emailTextL = clamp(emailBgL + 30, 60, 95);
                const onDarkL = clamp(bgL + 8, 70, 98);
                const onLightL = clamp(text1L - 3, 8, 18);

                return {
                    '--color-bg': hslStr(h, clamp(s - 12, 3, 40), bgL),
                    '--color-surface': hslStr(h, clamp(s - 15, 0, 35), surfL),
                    '--color-text-primary': hslStr(h, clamp(s + 8, 5, 70), text1L),
                    '--color-text-secondary': hslStr(h, clamp(s - 3, 3, 50), text2L),
                    '--color-text-muted': hslStr(h, clamp(s - 8, 2, 40), text3L),
                    '--color-accent': hslStr(h, clamp(s + 8, 5, 70), text1L),
                    '--color-header-start': hslStr(hdrH, hdrS, hdr1L),
                    '--color-header-end': hslStr(hdrH, clamp(hdrS - 3, 0, 35), hdr2L),
                    '--color-card-light': hslaStr(h, clamp(s - 8, 2, 35), clamp(bgL - 3, 55, 95), 0.95),
                    '--color-card-light-end': hslaStr(h, clamp(s - 12, 0, 30), clamp(bgL - 8, 50, 90), 0.95),
                    '--color-card-light-border': hslaStr(h, clamp(s - 10, 0, 30), clamp(bgL - 15, 45, 85), 0.6),
                    '--color-card-dark': hslaStr(h, clamp(s, 5, 60), clamp(hdr1L - 10, 20, 55), 0.9),
                    '--color-card-dark-end': hslaStr(h, clamp(s - 5, 0, 50), clamp(hdr1L - 18, 15, 48), 0.9),
                    '--color-card-dark-solid': hslStr(h, clamp(s, 5, 60), clamp(hdr1L - 8, 22, 58)),
                    '--color-card-dark-solid-end': hslStr(h, clamp(s - 5, 0, 50), clamp(hdr1L - 16, 18, 50)),
                    '--color-card-featured': hslaStr(h, clamp(s + 5, 10, 70), clamp(hdr1L - 18, 15, 48), 0.9),
                    '--color-card-featured-end': hslaStr(h, clamp(s, 5, 60), clamp(hdr1L - 25, 10, 42), 0.9),
                    '--color-card-featured-solid': hslStr(h, clamp(s + 5, 10, 70), clamp(hdr1L - 16, 18, 50)),
                    '--color-card-featured-solid-end': hslStr(h, clamp(s, 5, 60), clamp(hdr1L - 23, 12, 44)),
                    '--color-email-bg': hslStr(hdrH, hdrS, emailBgL),
                    '--color-email-text': hslStr(hdrH, clamp(hdrS + 15, 10, 80), emailTextL),
                    '--color-email-btn-text': hslStr(hdrH, hdrS, emailBgL),
                    '--color-email-btn-hover-bg': hslStr(hdrH, clamp(hdrS + 15, 10, 80), clamp(emailTextL + 2, 70, 98)),
                    '--color-email-feedback': hslStr(hdrH, clamp(hdrS + 5, 5, 50), clamp(emailBgL + 5, 30, 70)),
                    '--color-nav-border': hslStr(h, clamp(s - 12, 0, 30), clamp(bgL - 10, 50, 88)),
                    '--color-footer-text': hslStr(h, clamp(s - 8, 2, 40), text3L),
                    '--color-work-card-bg': hslStr(h, clamp(s - 12, 0, 30), clamp(bgL - 10, 50, 88)),
                    '--color-on-dark': hslStr(h, clamp(s - 8, 2, 35), onDarkL),
                    '--color-on-light': hslStr(h, clamp(s + 10, 5, 70), onLightL),
                    '--color-card-dark-btn-bg': '#FFFFFF',
                    '--color-card-featured-btn-bg': hslStr(h, clamp(s - 8, 2, 35), onDarkL),
                    '--color-card-featured-btn-text': hslStr(h, clamp(s + 10, 5, 70), onLightL),
                    '--color-list-border': hslStr(h, clamp(s - 15, 0, 25), clamp(bgL - 5, 55, 93)),
                    '--color-surface-alt': hslStr(h, clamp(s - 12, 0, 30), clamp(bgL - 3, 58, 95)),
                };
            }

            function applyTheme() {
                const vars = generateTheme(hue, sat, light);
                for (const [key, val] of Object.entries(vars)) {
                    html.style.setProperty(key, val);
                }
                localStorage.setItem('hslTheme', JSON.stringify({h: hue, s: sat, l: light}));
                sparkle.classList.add('lit');
                setTimeout(() => sparkle.classList.remove('lit'), 1200);
            }

            // --- Slider drag logic ---
            let activeKnob = null;
            let activeAxis = null;

            function getTrackValue(axis, clientX) {
                const track = tracks[axis];
                const rect = track.getBoundingClientRect();
                const pct = clamp((clientX - rect.left) / rect.width, 0, 1);
                switch(axis) {
                    case 'hue': return Math.round(pct * 360);
                    case 'sat': return Math.round(pct * 100);
                    case 'light': return Math.round(pct * 100);
                }
            }

            function startSlider(axis, e) {
                activeAxis = axis;
                activeKnob = knobs[axis];
                activeKnob.classList.add('dragging');
                const t = e.type.startsWith('touch') ? e.touches[0] : e;
                const val = getTrackValue(axis, t.clientX);
                if (axis === 'hue') hue = val;
                else if (axis === 'sat') sat = val;
                else if (axis === 'light') light = val;
                updateUI();
                // Live preview on swatch only (theme applied on sparkle click)
                e.preventDefault();
            }

            function moveSlider(e) {
                if (!activeAxis) return;
                const t = e.type.startsWith('touch') ? e.touches[0] : e;
                const val = getTrackValue(activeAxis, t.clientX);
                if (activeAxis === 'hue') hue = val;
                else if (activeAxis === 'sat') sat = val;
                else if (activeAxis === 'light') light = val;
                updateUI();
                e.preventDefault();
            }

            function endSlider() {
                if (activeKnob) {
                    activeKnob.classList.remove('dragging');
                    activeKnob = null;
                }
                activeAxis = null;
            }

            // Attach per-track
            for (const axis of ['hue', 'sat', 'light']) {
                tracks[axis].addEventListener('mousedown', (e) => startSlider(axis, e));
                tracks[axis].addEventListener('touchstart', (e) => startSlider(axis, e), { passive: false });
            }

            document.addEventListener('mousemove', moveSlider);
            document.addEventListener('mouseup', endSlider);
            document.addEventListener('touchmove', moveSlider, { passive: false });
            document.addEventListener('touchend', endSlider);

            // Click swatch or sparkle to apply theme
            swatch.addEventListener('click', applyTheme);

            // Initialize
            updateUI();
            applyTheme();
            setTimeout(() => sparkle.classList.remove('lit'), 100);
        })();
    </script>
</body>
</html>
