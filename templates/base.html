<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Raichuu - Creating digital art, process videos, tutorials, wallpapers and more">
    <meta name="author" content="Raichuu">
    
    <!-- Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <title>{{ title }} - CattySmoothy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/redesign.css') }}">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <div class="sparkle-picker" id="sparklePicker">
                    <div class="sparkle-track" id="sparkleTrack">
                        <div class="sparkle-dot" data-angle="0"></div>
                        <div class="sparkle-dot" data-angle="72"></div>
                        <div class="sparkle-dot" data-angle="144"></div>
                        <div class="sparkle-dot" data-angle="216"></div>
                        <div class="sparkle-dot" data-angle="288"></div>
                    </div>
                    <div class="sparkle-handle" id="sparkleHandle">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path d="M12 0l1.5 8.5L12 10l-1.5-1.5L12 0zm0 24l-1.5-8.5L12 14l1.5 1.5L12 24zM0 12l8.5-1.5L10 12l-1.5 1.5L0 12zm24 0l-8.5 1.5L14 12l1.5-1.5L24 12z" fill="currentColor"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <nav class="main-nav">
        <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">WORK</a>
        <a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}">ABOUT</a>
        <a href="{{ url_for('profile') }}" class="{% if request.endpoint == 'profile' %}active{% endif %}">COMMUNITY</a>
    </nav>
    
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Raichuu. All rights reserved.</p>
        </div>
    </footer>

    <script>
        (function() {
            const html = document.documentElement;
            const saved = localStorage.getItem('theme') || 'default';

            const themes = ['default', 'ocean', 'forest', 'lavender', 'rose'];
            const angles = [0, 72, 144, 216, 288];
            const radius = 18;

            const picker = document.getElementById('sparklePicker');
            const handle = document.getElementById('sparkleHandle');
            const dots = document.querySelectorAll('.sparkle-dot');

            function setTheme(theme) {
                if (theme === 'default') {
                    html.removeAttribute('data-theme');
                } else {
                    html.setAttribute('data-theme', theme);
                }
                localStorage.setItem('theme', theme);
                dots.forEach(d => {
                    d.classList.toggle('active', d.dataset.angle == angles[themes.indexOf(theme)]);
                });
            }

            function angleToPos(angle) {
                const rad = angle * Math.PI / 180;
                const cx = picker.offsetWidth / 2;
                const cy = picker.offsetHeight / 2;
                return {
                    x: cx + radius * Math.sin(rad),
                    y: cy - radius * Math.cos(rad)
                };
            }

            function moveHandleTo(angle, animate) {
                const pos = angleToPos(angle);
                if (animate) {
                    handle.style.transition = 'left 0.2s ease, top 0.2s ease';
                } else {
                    handle.style.transition = 'none';
                }
                handle.style.left = pos.x + 'px';
                handle.style.top = pos.y + 'px';
            }

            function snapToNearest(px, py) {
                const cx = picker.offsetWidth / 2;
                const cy = picker.offsetHeight / 2;
                const dx = px - cx;
                const dy = -(py - cy);
                let angle = Math.atan2(dx, dy) * 180 / Math.PI;
                if (angle < 0) angle += 360;
                let minDist = Infinity;
                let best = 0;
                for (let i = 0; i < angles.length; i++) {
                    let diff = Math.abs(angle - angles[i]);
                    if (diff > 180) diff = 360 - diff;
                    if (diff < minDist) {
                        minDist = diff;
                        best = i;
                    }
                }
                return best;
            }

            let dragging = false;
            let dragAngle = null;

            function startDrag(e) {
                dragging = true;
                handle.classList.add('glow');
                handle.style.transition = 'none';
                const t = e.type.startsWith('touch') ? e.touches[0] : e;
                const rect = picker.getBoundingClientRect();
                const px = t.clientX - rect.left;
                const py = t.clientY - rect.top;
                dragAngle = snapToNearest(px, py);
                moveHandleTo(angles[dragAngle]);
                e.preventDefault();
            }

            function onDrag(e) {
                if (!dragging) return;
                const t = e.type.startsWith('touch') ? e.touches[0] : e;
                const rect = picker.getBoundingClientRect();
                const px = Math.max(0, Math.min(rect.width, t.clientX - rect.left));
                const py = Math.max(0, Math.min(rect.height, t.clientY - rect.top));
                const idx = snapToNearest(px, py);
                if (idx !== dragAngle) {
                    dragAngle = idx;
                    moveHandleTo(angles[idx]);
                    setTheme(themes[idx]);
                }
                e.preventDefault();
            }

            function endDrag(e) {
                if (!dragging) return;
                dragging = false;
                handle.classList.remove('glow');
                if (dragAngle !== null) {
                    moveHandleTo(angles[dragAngle], true);
                }
            }

            // Mouse events
            handle.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', endDrag);

            // Touch events
            handle.addEventListener('touchstart', startDrag, { passive: false });
            document.addEventListener('touchmove', onDrag, { passive: false });
            document.addEventListener('touchend', endDrag);

            // Initialize
            const startIdx = themes.indexOf(saved) >= 0 ? themes.indexOf(saved) : 0;
            moveHandleTo(angles[startIdx]);
            dots.forEach(d => {
                d.classList.toggle('active', d.dataset.angle == angles[startIdx]);
            });

            // Position dots
            dots.forEach(d => {
                const a = parseFloat(d.dataset.angle);
                const pos = angleToPos(a);
                d.style.left = pos.x + 'px';
                d.style.top = pos.y + 'px';
                d.style.transform = 'translate(-50%, -50%)';
            });
        })();
    </script>
</body>
</html>
